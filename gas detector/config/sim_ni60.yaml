# 单粒子示例：仅发射 60Ni
particle:
  name: "Ni60"
  z: 28
  a: 60
  charge_state: 22
  kinetic_energy_mev: 100.0
  energy_sigma_mev: 0.8

detector:
  gas_material: "G4_PROPANE"
  gas_pressure_mbar: 38.7

beam:
  x_mean_mm: 0.0
  y_mean_mm: 0.0
  x_sigma_mm: 1.5
  y_sigma_mm: 1.5
  z_mm: -185.0

run:
  particles_per_round: 1000
  rounds: 5
  output_root: "events_ni60_q22.root"
